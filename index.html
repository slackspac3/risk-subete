<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="description" content="Risk Intelligence Platform — AI-assisted FAIR Monte Carlo technology and cyber risk assessment">
  <title>Risk Intelligence Platform</title>

  <!-- Design Tokens & Styles -->
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/app.css">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230e2d5e'/><text y='22' x='4' font-size='18' font-family='sans-serif' font-weight='bold' fill='white'>RQ</text></svg>">
</head>
<body>

<div id="app">
  <!-- App Bar (rendered by JS) -->

  <div id="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>
</div>

<!-- ── Service Layer ────────────────────────────────────────── -->
<script src="assets/services/authService.js"></script>

<script src="assets/ui/components.js"></script>

<!-- ── Router ───────────────────────────────────────────────── -->
<script src="assets/scenarios.js"></script>
  <script src="assets/share.js"></script>

<!-- ── Main App ─────────────────────────────────────────────── -->
<script src="assets/app.js"></script>

<!-- ── OpenAI API Key Setup (Optional) ──────────────────────── -->
<!--
  To enable real AI-assisted inputs, set your OpenAI API key:
  
  In browser console: LLMService.setOpenAIKey('sk-your-key-here');
  
  Or add a <script> block here (not recommended for production):
  <script>window.addEventListener('load', () => LLMService.setOpenAIKey('sk-...'));</script>
  
  For Compass (Core42) API, set the COMPASS_API_URL and COMPASS_API_KEY
  constants in assets/services/llmService.js
-->

</html>
